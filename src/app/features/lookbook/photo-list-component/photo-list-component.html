@if (loading()) {
  <section class="photo-grid skeleton-grid" aria-label="Loading lookbook photos" aria-busy="true">
    @for (item of skeletonItems; track item) {
      <article class="photo-skeleton-card">
        <span class="photo-skeleton-frame" aria-hidden="true"></span>
        <span class="photo-skeleton-caption" aria-hidden="true"></span>
      </article>
    }
  </section>
} @else if (error()) {
  <p class="state error">Could not load photos.</p>
} @else if (photos().length === 0) {
  <p class="state">No photos yet.</p>
} @else {
  <section class="photo-grid" aria-label="Lookbook photos">
    @for (photo of photos(); track photo.id) {
      <app-photo-component [photo]="photo" />
    }
  </section>
}
