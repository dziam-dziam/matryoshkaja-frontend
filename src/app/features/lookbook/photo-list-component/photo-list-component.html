@if (loading()) {
  <section class="photo-grid skeleton-grid" aria-label="Loading lookbook photos" aria-busy="true">
    @for (item of skeletonItems; track item) {
      <article class="photo-skeleton-card">
        <span class="photo-skeleton-frame" aria-hidden="true"></span>
        <span class="photo-skeleton-caption" aria-hidden="true"></span>
      </article>
    }
  </section>
} @else if (error()) {
  <p class="state error">Could not load photos.</p>
} @else if (photos().length === 0) {
  <p class="state">No photos yet.</p>
} @else {
  <section class="photo-grid" aria-label="Lookbook photos">
    @for (photo of photos(); track photo.id) {
      <app-photo-component [photo]="photo" (photoSelected)="openPhoto($event)" />
    }
  </section>
}
@if (selectedPhoto(); as photo) {
  <div class="photo-detail-backdrop" (click)="closePhoto()">
    <section
      class="photo-detail"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="getPhotoLabel(photo)"
      (click)="$event.stopPropagation()"
    >
      <button
        type="button"
        class="photo-detail-close"
        aria-label="Close photo detail"
        (click)="closePhoto()"
      >
        &times;
      </button>

      <figure>
        <img [src]="photo.imageUrl" [alt]="'Matryoshkaja photo ' + photo.id" />
        <figcaption>{{ getPhotoLabel(photo) }}</figcaption>
      </figure>
    </section>
  </div>
}
