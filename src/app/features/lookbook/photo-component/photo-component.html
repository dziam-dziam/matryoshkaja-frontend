<article class="photo-card">
  <button
    type="button"
    class="photo-open-button"
    [attr.aria-label]="'Open ' + (photo().caption || 'photo #' + photo().id)"
    (click)="selectPhoto()"
  >
    <img [src]="photo().imageUrl" [alt]="'Matryoshkaja photo ' + photo().id" />
  </button>

  <p class="photo-meta">
    <span>{{ photo().caption || 'Photo #' + photo().id }}</span>
  </p>
</article>
